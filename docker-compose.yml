version: '3.8'

services:
  # KaiTian main API service
  kaitian:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaitian-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - APP_NAME=KaiTian
      - APP_VERSION=0.1.0
      - DEBUG=false
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///./kaitian.db
      - CRAWL4AI_ENABLED=true
      - CRAWL4AI_API_URL=http://crawl4ai:8001
      - SEARCH_KEYWORDS=${SEARCH_KEYWORDS:-python,programming,automation}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - crawl4ai
    networks:
      - kaitian-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Crawl4AI service (external web scraping API)
  crawl4ai:
    image: "crawl4ai/crawl4ai:latest"
    container_name: crawl4ai-service
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - kaitian-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kaitian-network:
    driver: bridge

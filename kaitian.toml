# KaiTian 配置文件
# 配置加载优先级：kaitian.toml > pyproject.toml > 环境变量 > 默认值
# 环境变量前缀：每个模块的 env_prefix + 字段名（大写，嵌套用 __）

[database]
path = "./data/kaitian.db"
echo = false

[browser]
headless = true
timeout = 30000
user_data_dir = ""
proxy_server = ""
proxy_username = ""
proxy_password = ""
proxy_bypass = ""
enable_cdp = false
cdp_endpoint_url = ""
remote_debugging_port = 0

[stealth]
enabled = false

[crawl]
restart_delay_hours = 24
request_delay_seconds = 3
retry_count = 3

[download]
temp_dir = "./temp"
max_concurrent = 3
retry_count = 3
chunk_size = "1MB"
output_dir = "./downloads"
timeout_seconds = 300

[llm]
provider = "deepseek"
model = "deepseek-v4-flash"
api_key = ""
base_url = ""

[log]
level = "info"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = ""

[security]
encrypt_key = ""
session_timeout = 3600

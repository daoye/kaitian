[project]
name = "agent"
version = "0.1.0"
description = "LangGraph 智能体模块"
requires-python = ">=3.12"
dependencies = [
    "core",
    "langgraph>=1.1.0",
    "langchain-core>=0.3.0",
    "httpx>=0.27.0",
    "langchain-deepseek>=1.0.1",
    "mcp>=1.27.1",
    "langchain-mcp-adapters>=0.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent"]

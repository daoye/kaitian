[project]
name = "browser"
version = "0.1.0"
description = "Playwright 浏览器封装模块"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "core",
    "captcha",
    "playwright>=1.48.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/browser"]

[project]
name = "discovery"
version = "0.1.0"
description = "资源发现与监控模块"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "core",
    "browser",
    "auth",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/discovery"]

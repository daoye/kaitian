[project]
name = "downloader"
version = "0.1.0"
description = "资源下载模块"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "core",
    "sites",
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
]

[project.optional-dependencies]
browser = ["browser"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/downloader"]

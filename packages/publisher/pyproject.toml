[project]
name = "publisher"
version = "0.1.0"
description = "资源发布模块"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "core",
    "auth",
    "browser",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/publisher"]

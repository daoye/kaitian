[project]
name = "sites"
version = "0.1.0"
description = "站点特定实现"
requires-python = ">=3.12"
dependencies = [
    "core",
    "downloader",
    "agent",
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sites"]
